steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-f'
      - 'agent/Dockerfile'
      - '-t'
      - 'asia-east1-docker.pkg.dev/$PROJECT_ID/ailivex/ailivex-realtime-agent:$COMMIT_SHA'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - 'asia-east1-docker.pkg.dev/$PROJECT_ID/ailivex/ailivex-realtime-agent:$COMMIT_SHA'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ailivex-realtime-agent-gpt
      - '--image=asia-east1-docker.pkg.dev/$PROJECT_ID/ailivex/ailivex-realtime-agent:$COMMIT_SHA'
      - '--region=asia-east1'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--command=python'
      - '--args=-m,agent.main_gpt,start'
      # GPT Voice 線：SONIOX 不需要（無獨立 STT 段），OPENAI_API_KEY 是這條線的核心
      - '--set-secrets=LIVEKIT_URL=LIVEKIT_URL:latest,LIVEKIT_API_KEY=LIVEKIT_API_KEY:latest,LIVEKIT_API_SECRET=LIVEKIT_API_SECRET:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,MINIMAX_API_KEY=MINIMAX_API_KEY:latest,MINIMAX_GROUP_ID=MINIMAX_GROUP_ID:latest,FIREBASE_SERVICE_ACCOUNT_JSON=FIREBASE_SERVICE_ACCOUNT_JSON:latest,BRIDGE_URL=BRIDGE_URL:latest,BRIDGE_SECRET=BRIDGE_SECRET:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,WORKER_SECRET=WORKER_SECRET:latest'
      - '--set-env-vars=PROJECT_NAMESPACE=ailivex,MINIMAX_DEFAULT_VOICE_ID=Wise_Woman,GPT_REALTIME_MODEL=gpt-realtime-2.1-mini,PLATFORM_URL=https://ailivex-platform.vercel.app'
      # min-instances 不寫死（新服務預設 0 = 聾，燒不到錢）：POC 測試前手動升 1、測完降 0。
      # 方向安全——下次 deploy 洗回 0 只會「聾」不會「燒」；轉正時再接 voicePower 開關。
      - '--max-instances=2'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--no-cpu-throttling'
      - '--cpu-boost'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        OLD_REVISIONS=$(gcloud run revisions list \
          --service=ailivex-realtime-agent-gpt \
          --region=asia-east1 \
          --format="value(name)" \
          --sort-by="~metadata.creationTimestamp" \
          | tail -n +2)
        if [ -n "$$OLD_REVISIONS" ]; then
          echo "$$OLD_REVISIONS" | xargs -I{} gcloud run revisions delete {} \
            --region=asia-east1 --quiet
        fi

images:
  - 'asia-east1-docker.pkg.dev/$PROJECT_ID/ailivex/ailivex-realtime-agent:$COMMIT_SHA'
