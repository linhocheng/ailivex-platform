steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-f'
      - 'cloud-run/doc-worker/Dockerfile'
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/ailivex/doc-worker:$COMMIT_SHA
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/ailivex/doc-worker:latest
      - cloud-run/doc-worker
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - --all-tags
      - us-central1-docker.pkg.dev/$PROJECT_ID/ailivex/doc-worker

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ailivex-doc-worker
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/ailivex/doc-worker:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --no-allow-unauthenticated
      - --min-instances=0
      - --max-instances=5
      - --memory=512Mi
      - --cpu=1
      - --concurrency=5
      - --timeout=600
      - --service-account=ailivex-app@$PROJECT_ID.iam.gserviceaccount.com
      - --set-env-vars=BRIDGE_URL=https://bridge.soul-polaroid.work,FIREBASE_STORAGE_BUCKET=ailivex-2026-assets
      - >-
        --set-secrets=FIREBASE_SERVICE_ACCOUNT_JSON=FIREBASE_SERVICE_ACCOUNT_JSON:latest,BRIDGE_SECRET=BRIDGE_SECRET:latest

images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/ailivex/doc-worker:$COMMIT_SHA
  - us-central1-docker.pkg.dev/$PROJECT_ID/ailivex/doc-worker:latest

options:
  logging: CLOUD_LOGGING_ONLY
